# ===========================
# Application Name
# ===========================
spring.application.name=uprit

# ===========================
# MySQL Datasource
# ===========================
spring.datasource.url=jdbc:mysql://localhost:3306/uprit_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Ugesh@2006}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===========================
# JPA / Hibernate
# ===========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===========================
# JWT Configuration
# ===========================
app.jwt.secret=UpRitSuperSecretKey2024ThatIsLongEnoughForHS256Algorithm!
app.jwt.expiration-ms=86400000

# ===========================
# Server
# ===========================
server.port=8080